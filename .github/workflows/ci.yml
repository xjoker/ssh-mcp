name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.5'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      # The shell scripts (bash) need an explicit shell on windows-latest
      # so the runner uses Git for Windows' bash rather than PowerShell.
      - name: check deps
        shell: bash
        run: bash scripts/check-deps.sh

      - name: check no insecure
        shell: bash
        run: bash scripts/check-no-insecure.sh

      - name: build
        run: go build ./cmd/ssh-mcp
