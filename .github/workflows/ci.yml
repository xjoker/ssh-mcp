name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race ./...

      - name: check deps
        run: bash scripts/check-deps.sh

      - name: check no insecure
        run: bash scripts/check-no-insecure.sh

      - name: build
        run: go build -o bin/ssh-mcp ./cmd/ssh-mcp
