name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+'   # Stable tags, scheme vYYYYMMDD.V (no -dev suffix)

permissions:
  contents: write      # Required for creating GitHub Releases

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v20260713.1
          VERSION="${TAG#v}"                # e.g. 20260713.1
          COMMIT="$(git rev-parse --short HEAD)"
          # Single source of truth: the tag must match the committed VERSION file.
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "release: tag $TAG (version $VERSION) does not match VERSION file ($FILE_VERSION)" >&2
            exit 1
          fi
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"   >> "$GITHUB_OUTPUT"

      - name: Build cross-platform binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT:  ${{ steps.version.outputs.commit }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}"
          mkdir -p dist

          build() {
            local GOOS=$1 GOARCH=$2
            local EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            local OUT="dist/ssh-mcp_${GOOS}_${GOARCH}${EXT}"
            echo "Building $OUT..."
            GOOS=$GOOS GOARCH=$GOARCH go build \
              -trimpath \
              -ldflags="$LDFLAGS" \
              -o "$OUT" \
              ./cmd/ssh-mcp
          }

          build linux   amd64
          build linux   arm64
          build darwin  amd64
          build darwin  arm64
          build windows amd64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ssh-mcp ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/ssh-mcp_linux_amd64
            dist/ssh-mcp_linux_arm64
            dist/ssh-mcp_darwin_amd64
            dist/ssh-mcp_darwin_arm64
            dist/ssh-mcp_windows_amd64.exe
            dist/checksums.sha256
