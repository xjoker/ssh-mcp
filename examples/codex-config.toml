# Codex MCP server configuration for mcp-ssh-bridge.
#
# Codex ships an MCP-management CLI. Prefer running:
#   codex mcp add ssh-bridge -- ~/.local/bin/mcp-ssh-bridge
# rather than editing ~/.codex/config.toml by hand.
#
# If you do edit by hand, this is the shape of the section to append.
# Replace the command path with the actual install location:
#   macOS / Linux: ~/.local/bin/mcp-ssh-bridge
#   Windows      : %LOCALAPPDATA%\Programs\mcp-ssh-bridge\mcp-ssh-bridge.exe
#
# WARNING: Do NOT add autoApprove for any of mcp-ssh-bridge tools.
# The tools provided (ssh_exec, sftp_op, ssh_group_exec, etc.) can have
# unbounded effects on remote systems and must not be auto-approved.

[mcp_servers.ssh-bridge]
command = "/Users/<you>/.local/bin/mcp-ssh-bridge"
args    = []
